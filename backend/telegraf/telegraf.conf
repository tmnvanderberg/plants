# Bridge MQTT (broker: mosquitto) -> InfluxDB.
#
# Topic shape (per CLAUDE.md): plants/<device>/<sensor>
# Each message payload is a single float emitted by ESPHome.
#
# Resulting InfluxDB schema:
#   _measurement = <sensor>     (e.g. "moisture", "light")
#   tag device   = <device>     (e.g. "plant-node-01")
#   field value  = <float>

[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "plants/+/moisture",
    "plants/+/moisture_v",
    "plants/+/light",
    "plants/+/wifi_rssi",
    "plants/+/uptime",
  ]
  data_format = "value"
  data_type   = "float"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "plants/+/+"
    measurement = "_/_/measurement"
    tags        = "_/device/_"

[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "${INFLUX_TOKEN}"
  organization = "plants"
  bucket       = "sensors"
