# Minimal home-LAN config. Anonymous OK on a trusted network — switch to
# password_file + allow_anonymous false before exposing 1883 anywhere.

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# WebSocket listener (browser-based debug clients like MQTT Explorer Web).
listener 9001
protocol websockets
