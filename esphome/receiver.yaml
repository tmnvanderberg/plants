# Phase A receiver — ESP32-WROOM-32 dev board.
# Expected to be replaced or augmented by an ESP32-C3 SuperMini Plus with external
# antenna once Phase A tells us whether through-window BLE is viable.

substitutions:
  device_name: plant-receiver
  friendly_name: "Plant Receiver"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

packages:
  base: !include common/base.yaml

# Web UI for live debug — handy without Home Assistant.
web_server:
  port: 80

# BLE scanner — Phase A goal is to confirm Mi Flora is visible from here.
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

